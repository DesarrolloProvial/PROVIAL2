# ============================================================
# PROVIAL — Stack Completo para Dokploy
# Backend + Frontend + PostgreSQL + Redis
#
# Dokploy detectará este archivo automáticamente.
# Si no, indicá en la config: docker-compose.production.yml
#
# Uso: docker compose -f docker-compose.production.yml up -d --build
# ============================================================

services:
  # ============================================================
  # POSTGRES (con PostGIS)
  # ============================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: provial_postgres
    restart: always
    environment:
      POSTGRES_DB: provial_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      # Snapshot completo de la base — se ejecuta al iniciar SI la BD está vacía
      - ./database/seed.sql:/docker-entrypoint-initdb.d/00_seed.sql:ro
      # Migraciones incrementales (para aplicar después)
      - ./backend/migrations:/migrations:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - provial_network

  # ============================================================
  # REDIS
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: provial_redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - provial_network

  # ============================================================
  # MIGRATOR (aplica migraciones incrementales después del init)
  # ============================================================
  migrator:
    image: postgis/postgis:16-3.4-alpine
    container_name: provial_migrator
    volumes:
      - ./backend/migrations:/migrations:ro
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      PGDATABASE: provial_db
    command: >
      sh -c "
        echo 'Esperando postgres...';
        until psql -h $$PGHOST -U $$PGUSER -d $$PGDATABASE -c 'SELECT 1' > /dev/null 2>&1; do
          sleep 2;
        done;
        echo 'Postgres listo. Ejecutando migraciones...';
        for f in $$(ls /migrations/*.sql | sort); do
          echo \"Ejecutando: $$f\";
          psql -h $$PGHOST -U $$PGUSER -d $$PGDATABASE -f $$f 2>&1 || true;
        done;
        echo 'Migraciones completadas';
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - provial_network

  # ============================================================
  # BACKEND API
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provial_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: provial_db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/provial_db
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      SOCKET_IO_CORS_ORIGIN: ${SOCKET_IO_CORS_ORIGIN}
      STORAGE_TYPE: local
      STORAGE_BASE_URL: ${STORAGE_BASE_URL}
    depends_on:
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    volumes:
      - uploads_data:/app/uploads
    networks:
      - provial_network

  # ============================================================
  # WEB (React/Vite — build en Docker, nginx interno)
  # ============================================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
        VITE_APP_ENV: production
    container_name: provial_web
    restart: always
    networks:
      - provial_network

  # ============================================================
  # NGINX (Entry point único — puerto 80)
  # /api/         → backend:3000
  # /socket.io/   → backend:3000
  # /uploads/     → archivos subidos
  # /            → web:80 (frontend React)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: provial_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      - backend
      - web
    networks:
      - provial_network

# ============================================================
# VOLÚMENES
# ============================================================
volumes:
  postgres_data:
  redis_data:
  uploads_data:

# ============================================================
# RED
# ============================================================
networks:
  provial_network:
    driver: bridge
